name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix permissions
        run: |
          chmod -R 777 .

      - name: Install updated Cython
        run: |
          /home/user/.venv/bin/pip install --upgrade "Cython==3.0.11"

      - name: Build APK
        run: |
          yes | /home/user/.venv/bin/buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: galaxy-debug-apk
          path: bin/*.apk
          retention-days: 30
